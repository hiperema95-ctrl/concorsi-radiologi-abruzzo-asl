name: Svuota vecchie Run
on:
  workflow_dispatch:

# Aggiungi esplicitamente i permessi di scrittura qui sotto:
permissions:
  actions: write
  contents: read

jobs:
  del_runs:
    runs-on: ubuntu-latest
    steps:
      - name: Cancella le run
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 0
