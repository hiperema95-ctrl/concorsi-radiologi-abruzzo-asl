name: 🏥 Concorsi Radiologi Abruzzo

on:
  # ────────────────────────────────────────────────────────────
  # JOB 1 — scraping concorsi: ogni 6 ore
  # Orari UTC: 06:00 / 12:00 / 18:00 / 00:00
  # = Orari italiani (CEST +2): 08:00 / 14:00 / 20:00 / 02:00
  # ────────────────────────────────────────────────────────────
  schedule:
    - cron: '0 6,12,18,0 * * *'

  # Permette di avviare il controllo manualmente dalla scheda "Actions"
  workflow_dispatch:

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB PRINCIPALE — scraping + health check (logica nel Python)
  # ════════════════════════════════════════════════════════════
  check-concorsi:
    runs-on: ubuntu-latest

    # Permette al workflow di committare i file di stato nel repo
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🤖 Esegui bot (scraping + health check)
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        run: python bot.py

      # Salva seen_concorsi.json e health_state.json nel repo
      # così i dati persistono tra un'esecuzione e l'altra
      - name: 💾 Salva stato nel repository
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add seen_concorsi.json health_state.json
          git diff --staged --quiet || git commit -m "📋 Aggiorna stato bot [skip ci]"
          git push
